openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Cycle of Kings game API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: players
    description: Player management
  - name: towns
    description: Town and building management
  - name: army
    description: Army recruitment and management
  - name: missions
    description: Mission cards and dispatches
  - name: raids
    description: PvP raids
  - name: trade
    description: Trade routes
  - name: leaderboard
    description: Rankings
  - name: game
    description: Global game state

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /players:
    post:
      operationId: createPlayer
      tags: [players]
      summary: Create or find a player by device ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerInput"
      responses:
        "200":
          description: Player found or created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"

  /players/{playerId}:
    get:
      operationId: getPlayer
      tags: [players]
      summary: Get player by ID
      parameters:
        - name: playerId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Player
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
        "404":
          description: Not found

  /players/{playerId}/trophies:
    get:
      operationId: getPlayerTrophies
      tags: [players]
      summary: Get achievement history for a player (all cycles)
      parameters:
        - name: playerId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: List of trophies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trophy"

  /towns/{townId}:
    get:
      operationId: getTown
      tags: [towns]
      summary: Get town details including resources and scores
      parameters:
        - name: townId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Town
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Town"
        "404":
          description: Not found

  /towns/{townId}/slots:
    get:
      operationId: getBuildingSlots
      tags: [towns]
      summary: Get all building slots for a town
      parameters:
        - name: townId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Building slots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BuildingSlot"

  /towns/{townId}/slots/{slotType}/build:
    post:
      operationId: buildSlot
      tags: [towns]
      summary: Build in an empty slot (level 0 -> 1)
      parameters:
        - name: townId
          in: path
          required: true
          schema: { type: integer }
        - name: slotType
          in: path
          required: true
          schema:
            type: string
            enum: [townHall, farm, mine, quarry, lumberMill, barracks, archeryRange, stables, market, tavern, house, wall, tower]
      responses:
        "201":
          description: Building constructed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildingSlot"
        "400":
          description: Already built or insufficient resources

  /towns/{townId}/slots/{slotType}/upgrade:
    post:
      operationId: upgradeSlot
      tags: [towns]
      summary: Upgrade an existing building slot
      parameters:
        - name: townId
          in: path
          required: true
          schema: { type: integer }
        - name: slotType
          in: path
          required: true
          schema:
            type: string
            enum: [townHall, farm, mine, quarry, lumberMill, barracks, archeryRange, stables, market, tavern, house, wall, tower]
      responses:
        "200":
          description: Upgrade started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildingSlot"
        "400":
          description: Cannot upgrade (insufficient resources, already upgrading, max level, not built)

  /towns/{townId}/slots/{slotType}:
    delete:
      operationId: demolishSlot
      tags: [towns]
      summary: Demolish a building (75% resource refund, resets to level 0)
      parameters:
        - name: townId
          in: path
          required: true
          schema: { type: integer }
        - name: slotType
          in: path
          required: true
          schema:
            type: string
            enum: [townHall, farm, mine, quarry, lumberMill, barracks, archeryRange, stables, market, tavern, house, wall, tower]
      responses:
        "200":
          description: Demolished, refund granted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildingSlot"
        "400":
          description: Nothing to demolish

  /towns/{townId}/army:
    get:
      operationId: getTownArmy
      tags: [army]
      summary: Get army composition for a town
      parameters:
        - name: townId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Army
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Army"

  /towns/{townId}/peaceful:
    patch:
      operationId: setPeacefulMode
      tags: [towns]
      summary: Permanently enable peaceful mode (one opt-in per cycle, irreversible)
      parameters:
        - name: townId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PeacefulModeInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PeacefulModeResult"
        "404":
          description: Town not found

  /towns/{townId}/reset:
    post:
      operationId: resetTown
      tags: [towns]
      summary: Hard reset - wipe all buildings, army, missions and restore starting resources
      parameters:
        - name: townId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Kingdom reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetResult"
        "404":
          description: Town not found

  /missions:
    get:
      operationId: getMissions
      tags: [missions]
      summary: Get the 3 mission cards available this hour
      parameters:
        - name: townId
          in: query
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Mission cards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MissionCard"

  /towns/{townId}/missions:
    get:
      operationId: getTownMissions
      tags: [missions]
      summary: Get active and recent missions for a town
      parameters:
        - name: townId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Missions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActiveMission"
    post:
      operationId: dispatchMission
      tags: [missions]
      summary: Dispatch troops on a mission
      parameters:
        - name: townId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MissionDispatch"
      responses:
        "201":
          description: Mission dispatched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveMission"
        "400":
          description: Insufficient troops or invalid mission

  /towns/{townId}/trades:
    get:
      operationId: getTownTrades
      tags: [trade]
      summary: Get merchant trade deals for this hour (refreshes on the hour UTC)
      parameters:
        - name: townId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Hourly merchant deals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeDealsResponse"
    post:
      operationId: executeTradeDeal
      tags: [trade]
      summary: Execute a merchant trade deal (one use per deal per hour)
      parameters:
        - name: townId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TradeDealExecute"
      responses:
        "200":
          description: Trade completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeDealExecuteResult"
        "400":
          description: Invalid or unavailable deal

  /towns/{townId}/activities:
    get:
      operationId: getActivities
      summary: Get recent activity feed for a town
      parameters:
        - in: path
          name: townId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Activity"

  /towns/{townId}/raids:
    get:
      operationId: getTownRaids
      tags: [raids]
      summary: Get raid history (as attacker and defender)
      parameters:
        - name: townId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Raids
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Raid"

  /raids:
    post:
      operationId: launchRaid
      tags: [raids]
      summary: Launch a raid against another town
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RaidOrder"
      responses:
        "201":
          description: Raid result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Raid"
        "400":
          description: Insufficient troops or invalid target

  /leaderboard:
    get:
      operationId: getLeaderboard
      tags: [leaderboard]
      summary: Get the current cycle leaderboard
      responses:
        "200":
          description: Leaderboard entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"

  /towns:
    get:
      operationId: listTowns
      tags: [towns]
      summary: List all towns (for raiding / trade target selection)
      responses:
        "200":
          description: Towns
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TownSummary"

  /game/state:
    get:
      operationId: getGameState
      tags: [game]
      summary: Get current game state (season, cycle, weather events)
      responses:
        "200":
          description: Game state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameState"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }

    Player:
      type: object
      required: [id, deviceId, name, townId, createdAt]
      properties:
        id: { type: integer }
        deviceId: { type: string }
        name: { type: string }
        townId: { type: integer }
        trophyPoints: { type: integer }
        createdAt: { type: string }

    PlayerInput:
      type: object
      required: [deviceId, name]
      properties:
        deviceId: { type: string }
        name: { type: string }

    Trophy:
      type: object
      required: [id, playerId, type, cycleNumber, description, earnedAt]
      properties:
        id: { type: integer }
        playerId: { type: integer }
        type: { type: string }
        cycleNumber: { type: integer }
        description: { type: string }
        earnedAt: { type: string }

    Town:
      type: object
      required: [id, playerId, name, gold, food, wood, stone, goldPerHour, foodPerHour, woodPerHour, stonePerHour, economyScore, armyScore, staticDefense, totalDefense, peacefulMode, lastTickAt]
      properties:
        id: { type: integer }
        playerId: { type: integer }
        name: { type: string }
        gold: { type: number }
        food: { type: number }
        wood: { type: number }
        stone: { type: number }
        goldPerHour: { type: number }
        foodPerHour: { type: number }
        woodPerHour: { type: number }
        stonePerHour: { type: number }
        economyScore: { type: number }
        armyScore: { type: number }
        staticDefense: { type: number }
        totalDefense: { type: number }
        peacefulMode: { type: boolean }
        peacefulOptedInCycle: { type: integer, nullable: true }
        lastTickAt: { type: string }

    PeacefulModeInput:
      type: object
      required: [peaceful]
      properties:
        peaceful: { type: boolean }

    PeacefulModeResult:
      type: object
      required: [peacefulMode]
      properties:
        peacefulMode: { type: boolean }
        peacefulOptedInCycle: { type: integer, nullable: true }

    TownSummary:
      type: object
      required: [id, name, playerId, playerName, staticDefense, totalDefense, peacefulMode]
      properties:
        id: { type: integer }
        name: { type: string }
        playerId: { type: integer }
        playerName: { type: string }
        staticDefense: { type: number }
        totalDefense: { type: number }
        peacefulMode: { type: boolean }

    BuildingSlot:
      type: object
      required: [id, townId, slotType, level, upgrading, upgradeEndsAt]
      properties:
        id: { type: integer }
        townId: { type: integer }
        slotType:
          type: string
          enum: [townHall, farm, mine, quarry, lumberMill, barracks, archeryRange, stables, market, tavern, house, wall, tower]
        level: { type: integer }
        upgrading: { type: boolean }
        upgradeEndsAt: { type: ["string", "null"] }

    Army:
      type: object
      required: [townId, infantry, archers, cavalry, onMissionInfantry, onMissionArchers, onMissionCavalry, availableInfantry, availableArchers, availableCavalry, totalTroops, totalPower, capacity]
      properties:
        townId: { type: integer }
        infantry: { type: integer }
        archers: { type: integer }
        cavalry: { type: integer }
        onMissionInfantry: { type: integer }
        onMissionArchers: { type: integer }
        onMissionCavalry: { type: integer }
        availableInfantry: { type: integer }
        availableArchers: { type: integer }
        availableCavalry: { type: integer }
        infantryAttackMult: { type: number }
        archerAttackMult: { type: number }
        cavalryAttackMult: { type: number }
        totalTroops: { type: integer }
        totalPower: { type: integer }
        capacity: { type: integer }

    MissionCard:
      type: object
      required: [id, type, difficulty, title, description, minTroops, baseSuccessRate, lootGold, lootFood, lootWood, lootStone, durationMinutes]
      properties:
        id: { type: string }
        type:
          type: string
          enum: [explore, patrol, raid]
        difficulty:
          type: string
          enum: [easy, medium, hard]
        title: { type: string }
        description: { type: string }
        minTroops: { type: integer }
        baseSuccessRate: { type: number }
        lootGold: { type: number }
        lootFood: { type: number }
        lootWood: { type: number }
        lootStone: { type: number }
        durationMinutes: { type: integer }

    MissionDispatch:
      type: object
      required: [missionCardId]
      properties:
        missionCardId: { type: string }
        infantry: { type: integer, default: 0 }
        archers: { type: integer, default: 0 }
        cavalry: { type: integer, default: 0 }
        mercenaries: { type: integer, default: 0 }

    ActiveMission:
      type: object
      required: [id, townId, missionCardId, missionTitle, missionType, missionDifficulty, infantry, archers, cavalry, mercenaries, enemyInfantry, enemyArchers, enemyCavalry, successRate, status, dispatchedAt, returnsAt]
      properties:
        id: { type: integer }
        townId: { type: integer }
        missionCardId: { type: string }
        missionTitle: { type: string }
        missionType: { type: string }
        missionDifficulty: { type: string }
        infantry: { type: integer }
        enemyInfantry: { type: integer }
        enemyArchers: { type: integer }
        enemyCavalry: { type: integer }
        archers: { type: integer }
        cavalry: { type: integer }
        mercenaries: { type: integer }
        successRate: { type: number }
        status:
          type: string
          enum: [active, returned, failed]
        dispatchedAt: { type: string }
        returnsAt: { type: string }
        result: { type: ["string", "null"] }
        lootGold: { type: ["number", "null"] }
        lootFood: { type: ["number", "null"] }
        lootWood: { type: ["number", "null"] }
        lootStone: { type: ["number", "null"] }
        casualties: { type: ["integer", "null"] }

    TradeDeal:
      type: object
      required: [id, title, payResource, payAmount, receiveResource, receiveAmount, completed]
      properties:
        id: { type: string }
        title: { type: string }
        payResource:
          type: string
          enum: [gold, food, wood, stone]
        payAmount: { type: number }
        receiveResource:
          type: string
          enum: [gold, food, wood, stone]
        receiveAmount: { type: number }
        completed: { type: boolean }

    TradeDealsResponse:
      type: object
      required: [hourSeed, refreshesAt, deals]
      properties:
        hourSeed: { type: integer }
        refreshesAt: { type: string }
        deals:
          type: array
          items:
            $ref: "#/components/schemas/TradeDeal"

    TradeDealExecute:
      type: object
      required: [dealId]
      properties:
        dealId: { type: string }

    TradeDealExecuteResult:
      type: object
      required: [deal, gold, food, wood, stone]
      properties:
        deal:
          $ref: "#/components/schemas/TradeDeal"
        gold: { type: number }
        food: { type: number }
        wood: { type: number }
        stone: { type: number }

    Raid:
      type: object
      required: [id, attackerTownId, attackerTownName, defenderTownId, defenderTownName, result, attackerInfantry, attackerArchers, attackerCavalry, attackerCatapults, defenderStrength, lootGold, lootFood, lootWood, lootStone, attackerCasualties, createdAt]
      properties:
        id: { type: integer }
        attackerTownId: { type: integer }
        attackerTownName: { type: string }
        defenderTownId: { type: integer }
        defenderTownName: { type: string }
        result:
          type: string
          enum: [victory, defeat]
        attackerInfantry: { type: integer }
        attackerArchers: { type: integer }
        attackerCavalry: { type: integer }
        attackerCatapults: { type: integer }
        defenderStrength: { type: number }
        lootGold: { type: number }
        lootFood: { type: number }
        lootWood: { type: number }
        lootStone: { type: number }
        attackerCasualties: { type: integer }
        createdAt: { type: string }

    RaidOrder:
      type: object
      required: [attackerTownId, defenderTownId, infantry, archers, cavalry, catapults]
      properties:
        attackerTownId: { type: integer }
        defenderTownId: { type: integer }
        infantry: { type: integer }
        archers: { type: integer }
        cavalry: { type: integer }
        catapults: { type: integer }

    MissionTroopSide:
      type: object
      required: [infantry, archers, cavalry, total]
      properties:
        infantry: { type: integer }
        archers: { type: integer }
        cavalry: { type: integer }
        mercenaries: { type: integer }
        total: { type: integer }

    MissionActivityMetadata:
      type: object
      required: [missionTitle, success, playerTroops, enemyTroops]
      properties:
        missionTitle: { type: string }
        success: { type: boolean }
        playerTroops:
          $ref: "#/components/schemas/MissionTroopSide"
        enemyTroops:
          $ref: "#/components/schemas/MissionTroopSide"
        loot:
          type: object
          properties:
            gold: { type: number }
            food: { type: number }
            wood: { type: number }
            stone: { type: number }
        casualties: { type: integer }

    Activity:
      type: object
      required: [id, townId, type, title, body, icon, iconColor, createdAt]
      properties:
        id: { type: integer }
        townId: { type: integer }
        type: { type: string }
        title: { type: string }
        body: { type: string }
        icon: { type: string }
        iconColor: { type: string }
        metadata:
          oneOf:
            - $ref: "#/components/schemas/MissionActivityMetadata"
            - type: "null"
        createdAt: { type: string }

    LeaderboardEntry:
      type: object
      required: [rank, townId, townName, playerId, playerName, score, economyScore, armyScore, gold]
      properties:
        rank: { type: integer }
        townId: { type: integer }
        townName: { type: string }
        playerId: { type: integer }
        playerName: { type: string }
        score: { type: number }
        economyScore: { type: number }
        armyScore: { type: number }
        gold: { type: number }

    ResetResult:
      type: object
      required: [success, gold, food, wood, stone]
      properties:
        success: { type: boolean }
        gold: { type: number }
        food: { type: number }
        wood: { type: number }
        stone: { type: number }

    GameState:
      type: object
      required: [cycleNumber, season, seasonName, cycleStartedAt, nextWipeAt, currentHour, weatherEvent, weatherActive]
      properties:
        cycleNumber: { type: integer }
        season:
          type: string
          enum: [spring, summer, autumn, winter]
        seasonName: { type: string }
        cycleStartedAt: { type: string }
        nextWipeAt: { type: string }
        currentHour: { type: integer }
        weatherEvent: { type: ["string", "null"] }
        weatherActive: { type: boolean }
        seasonModifiers:
          type: object
          properties:
            gold: { type: number }
            food: { type: number }
            wood: { type: number }
            stone: { type: number }
