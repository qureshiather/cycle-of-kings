openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Cycle of Kings game API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: players
    description: Player management
  - name: towns
    description: Town and building management
  - name: army
    description: Army recruitment and management
  - name: missions
    description: Mission cards and dispatches
  - name: spy
    description: Espionage operations
  - name: raids
    description: PvP raids
  - name: trade
    description: Trade routes
  - name: leaderboard
    description: Rankings
  - name: game
    description: Global game state

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /players/me:
    get:
      operationId: getCurrentPlayer
      tags: [players]
      summary: Get the authenticated player's profile and kingdom
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Player
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
        "401":
          description: Unauthorized
        "404":
          description: No player linked to this account

  /players:
    post:
      operationId: createPlayer
      tags: [players]
      summary: Create or find a player for the authenticated Supabase user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerInput"
      responses:
        "200":
          description: Player found or created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
        "401":
          description: Unauthorized

  /players/{playerId}:
    get:
      operationId: getPlayer
      tags: [players]
      summary: Get player by ID
      parameters:
        - name: playerId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Player
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
        "404":
          description: Not found

  /players/{playerId}/trophies:
    get:
      operationId: getPlayerTrophies
      tags: [players]
      summary: Get achievement history for a player (all cycles)
      parameters:
        - name: playerId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: List of trophies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trophy"

  /towns/{townId}:
    get:
      operationId: getTown
      tags: [towns]
      summary: Get town details including resources and scores
      parameters:
        - name: townId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Town
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Town"
        "404":
          description: Not found

  /towns/{townId}/slots:
    get:
      operationId: getBuildingSlots
      tags: [towns]
      summary: Get all building slots for a town
      parameters:
        - name: townId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Building slots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BuildingSlot"

  /towns/{townId}/slots/{slotType}/build:
    post:
      operationId: buildSlot
      tags: [towns]
      summary: Build in an empty slot (level 0 -> 1)
      parameters:
        - name: townId
          in: path
          required: true
          schema: { type: integer }
        - name: slotType
          in: path
          required: true
          schema:
            type: string
            enum: [townHall, farm, mine, quarry, lumberMill, barracks, archeryRange, stables, market, tavern, house, wall, tower, spyGuild, shipyard, museum, monument]
      responses:
        "201":
          description: Building constructed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildingSlot"
        "400":
          description: Already built or insufficient resources

  /towns/{townId}/slots/{slotType}/upgrade:
    post:
      operationId: upgradeSlot
      tags: [towns]
      summary: Upgrade an existing building slot
      parameters:
        - name: townId
          in: path
          required: true
          schema: { type: integer }
        - name: slotType
          in: path
          required: true
          schema:
            type: string
            enum: [townHall, farm, mine, quarry, lumberMill, barracks, archeryRange, stables, market, tavern, house, wall, tower, spyGuild, shipyard, museum, monument]
      responses:
        "200":
          description: Upgrade started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildingSlot"
        "400":
          description: Cannot upgrade (insufficient resources, already upgrading, max level, not built)

  /towns/{townId}/slots/{slotType}:
    delete:
      operationId: demolishSlot
      tags: [towns]
      summary: Demolish a building (75% resource refund, resets to level 0)
      parameters:
        - name: townId
          in: path
          required: true
          schema: { type: integer }
        - name: slotType
          in: path
          required: true
          schema:
            type: string
            enum: [townHall, farm, mine, quarry, lumberMill, barracks, archeryRange, stables, market, tavern, house, wall, tower, spyGuild, shipyard, museum, monument]
      responses:
        "200":
          description: Demolished, refund granted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildingSlot"
        "400":
          description: Nothing to demolish

  /towns/{townId}/army:
    get:
      operationId: getTownArmy
      tags: [army]
      summary: Get army composition for a town
      parameters:
        - name: townId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Army
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Army"

  /towns/{townId}/army/recruit:
    post:
      operationId: recruitArmy
      tags: [army]
      summary: Start recruiting troops (fills toward building caps)
      parameters:
        - name: townId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecruitArmyInput"
      responses:
        "200":
          description: Training started or completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Army"
        "400":
          description: Invalid request, queue busy, at cap, or insufficient resources

  /towns/{townId}/peaceful:
    patch:
      operationId: setPeacefulMode
      tags: [towns]
      summary: Permanently enable peaceful mode (one opt-in per cycle, irreversible)
      parameters:
        - name: townId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PeacefulModeInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PeacefulModeResult"
        "404":
          description: Town not found

  /towns/{townId}/reset:
    post:
      operationId: resetTown
      tags: [towns]
      summary: Hard reset - wipe all buildings, army, missions and restore starting resources
      parameters:
        - name: townId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Kingdom reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetResult"
        "404":
          description: Town not found

  /missions:
    get:
      operationId: getMissions
      tags: [missions]
      summary: Get the 3 mission cards available this hour
      parameters:
        - name: townId
          in: query
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Mission cards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MissionCard"

  /towns/{townId}/missions:
    get:
      operationId: getTownMissions
      tags: [missions]
      summary: Get active and recent missions for a town
      parameters:
        - name: townId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Missions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActiveMission"
    post:
      operationId: dispatchMission
      tags: [missions]
      summary: Dispatch troops on a mission
      parameters:
        - name: townId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MissionDispatch"
      responses:
        "201":
          description: Mission dispatched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveMission"
        "400":
          description: Insufficient troops or invalid mission

  /towns/{townId}/spy-board:
    get:
      operationId: getSpyBoard
      tags: [spy]
      summary: Get espionage cards available this rotation
      parameters:
        - name: townId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Spy cards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SpyCard"

  /towns/{townId}/spy-operations:
    get:
      operationId: getSpyOperations
      tags: [spy]
      summary: Get active and recent spy operations
      parameters:
        - name: townId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Spy operations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SpyOperation"
    post:
      operationId: dispatchSpyOperation
      tags: [spy]
      summary: Dispatch spies on an espionage card
      parameters:
        - name: townId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpyDispatch"
      responses:
        "201":
          description: Spy operation dispatched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpyOperationDispatchResult"
        "400":
          description: Insufficient spies or invalid card

  /towns/{townId}/trades:
    get:
      operationId: getTownTrades
      tags: [trade]
      summary: Get merchant trade deals for this hour (refreshes on the hour UTC)
      parameters:
        - name: townId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Hourly merchant deals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeDealsResponse"
    post:
      operationId: executeTradeDeal
      tags: [trade]
      summary: Execute a merchant trade deal (one use per deal per hour)
      parameters:
        - name: townId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TradeDealExecute"
      responses:
        "200":
          description: Trade completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeDealExecuteResult"
        "400":
          description: Invalid or unavailable deal

  /towns/{townId}/activities:
    get:
      operationId: getActivities
      summary: Get recent activity feed for a town
      parameters:
        - in: path
          name: townId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Activity"

  /towns/{townId}/raids:
    get:
      operationId: getTownRaids
      tags: [raids]
      summary: Get raid history (as attacker and defender)
      parameters:
        - name: townId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Raids
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Raid"

  /raids:
    post:
      operationId: launchRaid
      tags: [raids]
      summary: Launch a raid against another town
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RaidOrder"
      responses:
        "201":
          description: Raid launched (marching) or resolved record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Raid"
        "400":
          description: Insufficient troops or invalid target

  /leaderboard:
    get:
      operationId: getLeaderboard
      tags: [leaderboard]
      summary: Get the current cycle leaderboard
      responses:
        "200":
          description: Leaderboard entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"

  /towns:
    get:
      operationId: listTowns
      tags: [towns]
      summary: List all towns (for raiding / trade target selection)
      responses:
        "200":
          description: Towns
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TownSummary"

  /game/state:
    get:
      operationId: getGameState
      tags: [game]
      summary: Get current game state (season, cycle, weather events)
      responses:
        "200":
          description: Game state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameState"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }

    Player:
      type: object
      required: [id, authUserId, name, townId, createdAt]
      properties:
        id: { type: integer }
        authUserId: { type: string, format: uuid }
        name: { type: string }
        townId: { type: integer }
        trophyPoints: { type: integer }
        createdAt: { type: string }

    PlayerInput:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 2, maxLength: 14 }

    Trophy:
      type: object
      required: [id, playerId, type, cycleNumber, description, earnedAt]
      properties:
        id: { type: integer }
        playerId: { type: integer }
        type: { type: string }
        cycleNumber: { type: integer }
        description: { type: string }
        earnedAt: { type: string }

    Town:
      type: object
      required: [id, playerId, name, gold, food, wood, stone, goldPerHour, foodPerHour, woodPerHour, stonePerHour, economyScore, armyScore, staticDefense, totalDefense, peacefulMode, population, populationCap, populationPerHour, foodUpkeepPerHour, morale, lastTickAt, cycleReset]
      properties:
        id: { type: integer }
        playerId: { type: integer }
        name: { type: string }
        gold: { type: number }
        food: { type: number }
        wood: { type: number }
        stone: { type: number }
        goldPerHour: { type: number }
        foodPerHour: { type: number }
        woodPerHour: { type: number }
        stonePerHour: { type: number }
        netFoodPerHour: { type: number }
        economyScore: { type: number }
        armyScore: { type: number }
        staticDefense: { type: number }
        totalDefense: { type: number }
        peacefulMode: { type: boolean }
        peacefulOptedInCycle: { type: integer, nullable: true }
        population: { type: number }
        populationCap: { type: number }
        populationPerHour: { type: number }
        foodUpkeepPerHour: { type: number }
        troopFoodUpkeepPerHour: { type: number }
        morale: { type: number }
        lastTickAt: { type: string }
        cycleReset: { type: boolean, description: True when this response follows a per-cycle kingdom wipe }

    PeacefulModeInput:
      type: object
      required: [peaceful]
      properties:
        peaceful: { type: boolean }

    PeacefulModeResult:
      type: object
      required: [peacefulMode]
      properties:
        peacefulMode: { type: boolean }
        peacefulOptedInCycle: { type: integer, nullable: true }

    TownSummary:
      type: object
      required: [id, name, playerId, playerName, staticDefense, totalDefense, peacefulMode]
      properties:
        id: { type: integer }
        name: { type: string }
        playerId: { type: integer }
        playerName: { type: string }
        staticDefense: { type: number }
        totalDefense: { type: number }
        peacefulMode: { type: boolean }

    BuildingSlot:
      type: object
      required: [id, townId, slotType, level, upgrading, upgradeEndsAt]
      properties:
        id: { type: integer }
        townId: { type: integer }
        slotType:
          type: string
          enum: [townHall, farm, mine, quarry, lumberMill, barracks, archeryRange, stables, market, tavern, house, wall, tower]
        level: { type: integer }
        upgrading: { type: boolean }
        upgradeEndsAt: { type: ["string", "null"] }
        awardedAchievements:
          type: array
          items: { type: string }

    RecruitArmyInput:
      type: object
      required: [unit, count]
      properties:
        unit:
          type: string
          enum: [infantry, archers, cavalry]
        count:
          type: integer
          minimum: 1
          maximum: 5

    Army:
      type: object
      required: [townId, infantry, archers, cavalry, capInfantry, capArchers, capCavalry, ships, spies, onMissionInfantry, onMissionArchers, onMissionCavalry, onMissionSpies, onMissionShips, availableInfantry, availableArchers, availableCavalry, availableSpies, availableShips, totalTroops, totalPower, totalCap, troopFoodUpkeepPerHour, capacity]
      properties:
        townId: { type: integer }
        infantry: { type: integer, description: Recruited infantry count }
        archers: { type: integer }
        cavalry: { type: integer }
        capInfantry: { type: integer }
        capArchers: { type: integer }
        capCavalry: { type: integer }
        ships: { type: integer }
        spies: { type: integer }
        trainingUnit: { type: string, nullable: true, enum: [infantry, archers, cavalry, null] }
        trainingCount: { type: integer }
        trainingEndsAt: { type: string, nullable: true }
        onMissionInfantry: { type: integer }
        onMissionArchers: { type: integer }
        onMissionCavalry: { type: integer }
        onMissionSpies: { type: integer }
        onMissionShips: { type: integer }
        availableInfantry: { type: integer }
        availableArchers: { type: integer }
        availableCavalry: { type: integer }
        availableSpies: { type: integer }
        availableShips: { type: integer }
        infantryAttackMult: { type: number }
        archerAttackMult: { type: number }
        cavalryAttackMult: { type: number }
        totalTroops: { type: integer }
        totalPower: { type: integer }
        totalCap: { type: integer, description: Sum of barracks/archery/stables recruit caps }
        troopFoodUpkeepPerHour: { type: number, description: Ongoing food cost for recruited troops (0.4 per troop per hour) }
        capacity: { type: integer, description: Legacy population-density field (house-based); not troop cap }

    MissionCard:
      type: object
      required: [id, type, difficulty, title, description, minTroops, minShips, baseSuccessRate, lootGold, lootFood, lootWood, lootStone, durationMinutes]
      properties:
        id: { type: string }
        type:
          type: string
          enum: [explore, patrol, raid, naval]
        difficulty:
          type: string
          enum: [easy, medium, hard]
        title: { type: string }
        description: { type: string }
        minTroops: { type: integer }
        minShips: { type: integer }
        baseSuccessRate: { type: number }
        lootGold: { type: number }
        lootFood: { type: number }
        lootWood: { type: number }
        lootStone: { type: number }
        durationMinutes: { type: integer }

    MissionDispatch:
      type: object
      required: [missionCardId]
      properties:
        missionCardId: { type: string }
        infantry: { type: integer, default: 0 }
        archers: { type: integer, default: 0 }
        cavalry: { type: integer, default: 0 }
        mercenaries: { type: integer, default: 0 }
        ships: { type: integer, default: 0 }

    ActiveMission:
      type: object
      required: [id, townId, missionCardId, missionTitle, missionType, missionDifficulty, infantry, archers, cavalry, mercenaries, ships, enemyInfantry, enemyArchers, enemyCavalry, successRate, status, dispatchedAt, returnsAt]
      properties:
        id: { type: integer }
        townId: { type: integer }
        missionCardId: { type: string }
        missionTitle: { type: string }
        missionType: { type: string }
        missionDifficulty: { type: string }
        infantry: { type: integer }
        enemyInfantry: { type: integer }
        enemyArchers: { type: integer }
        enemyCavalry: { type: integer }
        archers: { type: integer }
        cavalry: { type: integer }
        mercenaries: { type: integer }
        ships: { type: integer }
        successRate: { type: number }
        status:
          type: string
          enum: [active, returned, failed]
        dispatchedAt: { type: string }
        returnsAt: { type: string }
        result: { type: ["string", "null"] }
        lootGold: { type: ["number", "null"] }
        lootFood: { type: ["number", "null"] }
        lootWood: { type: ["number", "null"] }
        lootStone: { type: ["number", "null"] }
        casualties: { type: ["integer", "null"] }
        awardedAchievements:
          type: array
          items: { type: string }

    SpyCard:
      type: object
      required: [id, type, difficulty, title, description, minSpies, baseSuccessRate, lootGold, lootFood, lootWood, lootStone, durationMinutes]
      properties:
        id: { type: string }
        type:
          type: string
          enum: [infiltrate, steal, sabotage]
        difficulty:
          type: string
          enum: [easy, medium, hard]
        title: { type: string }
        description: { type: string }
        minSpies: { type: integer }
        baseSuccessRate: { type: number }
        lootGold: { type: number }
        lootFood: { type: number }
        lootWood: { type: number }
        lootStone: { type: number }
        durationMinutes: { type: integer }

    SpyDispatch:
      type: object
      required: [cardId, spies]
      properties:
        cardId: { type: string }
        spies: { type: integer }

    SpyOperation:
      type: object
      required: [id, townId, cardId, title, operationType, difficulty, spiesDeployed, successRate, status, dispatchedAt, returnsAt]
      properties:
        id: { type: integer }
        townId: { type: integer }
        cardId: { type: string }
        title: { type: string }
        operationType: { type: string }
        difficulty: { type: string }
        spiesDeployed: { type: integer }
        successRate: { type: number }
        status:
          type: string
          enum: [active, returned, failed]
        dispatchedAt: { type: string }
        returnsAt: { type: string }
        result: { type: ["string", "null"] }
        lootGold: { type: ["number", "null"] }
        lootFood: { type: ["number", "null"] }
        lootWood: { type: ["number", "null"] }
        lootStone: { type: ["number", "null"] }
        spiesLost: { type: ["integer", "null"] }

    SpyOperationDispatchResult:
      type: object
      required: [operation, awardedAchievements]
      properties:
        operation:
          $ref: "#/components/schemas/SpyOperation"
        awardedAchievements:
          type: array
          items: { type: string }

    TradeDeal:
      type: object
      required: [id, title, payResource, payAmount, receiveResource, receiveAmount, completed]
      properties:
        id: { type: string }
        title: { type: string }
        payResource:
          type: string
          enum: [gold, food, wood, stone]
        payAmount: { type: number }
        receiveResource:
          type: string
          enum: [gold, food, wood, stone]
        receiveAmount: { type: number }
        completed: { type: boolean }

    TradeDealsResponse:
      type: object
      required: [hourSeed, refreshesAt, deals]
      properties:
        hourSeed: { type: integer }
        refreshesAt: { type: string }
        deals:
          type: array
          items:
            $ref: "#/components/schemas/TradeDeal"

    TradeDealExecute:
      type: object
      required: [dealId]
      properties:
        dealId: { type: string }

    TradeDealExecuteResult:
      type: object
      required: [deal, gold, food, wood, stone]
      properties:
        deal:
          $ref: "#/components/schemas/TradeDeal"
        gold: { type: number }
        food: { type: number }
        wood: { type: number }
        stone: { type: number }

    Raid:
      type: object
      required: [id, attackerTownId, attackerTownName, defenderTownId, defenderTownName, status, attackerInfantry, attackerArchers, attackerCavalry, attackerCatapults, defenderStrength, defenderRewardGold, defenderRewardFood, lootGold, lootFood, lootWood, lootStone, attackerCasualties, createdAt, arrivesAt]
      properties:
        id: { type: integer }
        attackerTownId: { type: integer }
        attackerTownName: { type: string }
        defenderTownId: { type: integer }
        defenderTownName: { type: string }
        status:
          type: string
          enum: [marching, resolved]
        result:
          type: string
          nullable: true
          enum: [victory, defeat]
        arrivesAt: { type: string }
        attackerInfantry: { type: integer }
        attackerArchers: { type: integer }
        attackerCavalry: { type: integer }
        attackerCatapults: { type: integer }
        defenderStrength: { type: number }
        attackPower:
          type: number
          nullable: true
          description: Attacker attack power at battle resolution (null while marching)
        defenderRewardGold: { type: number }
        defenderRewardFood: { type: number }
        lootGold: { type: number }
        lootFood: { type: number }
        lootWood: { type: number }
        lootStone: { type: number }
        attackerCasualties: { type: integer }
        createdAt: { type: string }

    RaidOrder:
      type: object
      required: [attackerTownId, defenderTownId, infantry, archers, cavalry, catapults]
      properties:
        attackerTownId: { type: integer }
        defenderTownId: { type: integer }
        infantry: { type: integer }
        archers: { type: integer }
        cavalry: { type: integer }
        catapults: { type: integer }

    MissionTroopSide:
      type: object
      required: [infantry, archers, cavalry, total]
      properties:
        infantry: { type: integer }
        archers: { type: integer }
        cavalry: { type: integer }
        mercenaries: { type: integer }
        total: { type: integer }

    MissionActivityMetadata:
      type: object
      required: [missionTitle, success, playerTroops, enemyTroops]
      properties:
        missionTitle: { type: string }
        success: { type: boolean }
        playerTroops:
          $ref: "#/components/schemas/MissionTroopSide"
        enemyTroops:
          $ref: "#/components/schemas/MissionTroopSide"
        loot:
          type: object
          properties:
            gold: { type: number }
            food: { type: number }
            wood: { type: number }
            stone: { type: number }
        casualties: { type: integer }

    RaidActivityMetadata:
      type: object
      required: [raidTitle, role, success, opponentTownName, attackerTroops, defenderStrength, attackPower]
      properties:
        raidTitle: { type: string }
        role:
          type: string
          enum: [attacker, defender]
        success: { type: boolean }
        opponentTownName: { type: string }
        attackerTroops:
          $ref: "#/components/schemas/MissionTroopSide"
        defenderStrength: { type: number }
        attackPower: { type: number }
        loot:
          type: object
          properties:
            gold: { type: number }
            food: { type: number }
            wood: { type: number }
            stone: { type: number }
        casualties: { type: integer }
        defenderReward:
          type: object
          description: Bounty granted when the defender repels the raid
          properties:
            gold: { type: number }
            food: { type: number }
            wood: { type: number }
            stone: { type: number }

    Activity:
      type: object
      required: [id, townId, type, title, body, icon, iconColor, createdAt]
      properties:
        id: { type: integer }
        townId: { type: integer }
        type: { type: string }
        title: { type: string }
        body: { type: string }
        icon: { type: string }
        iconColor: { type: string }
        metadata:
          oneOf:
            - $ref: "#/components/schemas/MissionActivityMetadata"
            - $ref: "#/components/schemas/RaidActivityMetadata"
            - type: "null"
        createdAt: { type: string }

    LeaderboardEntry:
      type: object
      required: [rank, townId, townName, playerId, playerName, score, economyScore, armyScore, gold]
      properties:
        rank: { type: integer }
        townId: { type: integer }
        townName: { type: string }
        playerId: { type: integer }
        playerName: { type: string }
        score: { type: number }
        economyScore: { type: number }
        armyScore: { type: number }
        gold: { type: number }

    ResetResult:
      type: object
      required: [success, gold, food, wood, stone]
      properties:
        success: { type: boolean }
        gold: { type: number }
        food: { type: number }
        wood: { type: number }
        stone: { type: number }

    ResourceModifiers:
      type: object
      required: [gold, food, wood, stone]
      properties:
        gold: { type: number }
        food: { type: number }
        wood: { type: number }
        stone: { type: number }

    RealmEvent:
      type: object
      required: [id, title, flavor, startsAt, endsAt]
      properties:
        id: { type: string }
        title: { type: string }
        flavor: { type: string }
        startsAt: { type: string }
        endsAt: { type: string }

    ScheduledRealmEvent:
      type: object
      required: [id, title, flavor, startsAt, endsAt]
      properties:
        id: { type: string }
        title: { type: string }
        flavor: { type: string }
        startsAt: { type: string }
        endsAt: { type: string }

    GameState:
      type: object
      required: [cycleNumber, season, seasonName, cycleStartedAt, nextWipeAt, currentHour, realmEvent, realmEventActive, realmEventModifiers, cycleEventSchedule]
      properties:
        cycleNumber: { type: integer }
        season:
          type: string
          enum: [spring, summer, autumn, winter]
        seasonName: { type: string }
        cycleStartedAt: { type: string }
        nextWipeAt: { type: string }
        currentHour: { type: integer }
        realmEvent:
          oneOf:
            - $ref: "#/components/schemas/RealmEvent"
            - type: "null"
        realmEventActive: { type: boolean }
        realmEventModifiers:
          $ref: "#/components/schemas/ResourceModifiers"
        upcomingRealmEvent:
          oneOf:
            - $ref: "#/components/schemas/ScheduledRealmEvent"
            - type: "null"
        cycleEventSchedule:
          type: array
          items:
            $ref: "#/components/schemas/ScheduledRealmEvent"
        seasonModifiers:
          $ref: "#/components/schemas/ResourceModifiers"
